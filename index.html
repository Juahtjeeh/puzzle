<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f3; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding: 2rem 1rem; color: #1a1a1a; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
    .stats { display: flex; gap: 12px; margin-bottom: 1rem; width: 100%; max-width: 360px; }
    .stat { flex: 1; background: #fff; border-radius: 8px; border: 0.5px solid #ddd; padding: 10px; text-align: center; }
    .stat-label { font-size: 12px; color: #888; }
    .stat-value { font-size: 20px; font-weight: 500; }
    .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 360px; width: 100%; }
    .card { aspect-ratio: 1; border-radius: 8px; border: 0.5px solid #ccc; background: #e8e8e5; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 28px; transition: transform 0.15s; user-select: none; }
    .card:hover { transform: scale(1.05); }
    .card.flipped, .card.matched { background: #fff; }
    .card.matched { border-color: #1D9E75; opacity: 0.6; cursor: default; }
    .card.matched:hover { transform: none; }
    .front { display: none; }
    .card.flipped .front, .card.matched .front { display: block; }
    .card.flipped .back, .card.matched .back { display: none; }
    .back { font-size: 20px; color: #aaa; }
    .win-msg { margin-top: 1rem; color: #1D9E75; font-weight: 500; font-size: 15px; min-height: 22px; text-align: center; }
    button { margin-top: 1rem; padding: 8px 24px; border: 0.5px solid #ccc; border-radius: 8px; background: transparent; color: #1a1a1a; cursor: pointer; font-size: 14px; }
    button:hover { background: #efefed; }
  </style>
</head>
<body>
  <h1>Memory</h1>
  <div class="stats">
    <div class="stat"><div class="stat-label">Pogingen</div><div class="stat-value" id="moves">0</div></div>
    <div class="stat"><div class="stat-label">Gevonden</div><div class="stat-value" id="found">0/8</div></div>
    <div class="stat"><div class="stat-label">Tijd</div><div class="stat-value" id="timer">0s</div></div>
  </div>
  <div class="board" id="board"></div>
  <div class="win-msg" id="win-msg"></div>
  <button onclick="initGame()">Nieuw spel</button>

  <script>
    const emojis = ['🍕','🎸','🌵','🐬','🦋','🎯','🍄','🚀'];
    let flipped = [], matched = 0, moves = 0, lock = false, timer = 0, interval = null, started = false;

    function shuffle(arr) { return [...arr, ...arr].sort(() => Math.random() - 0.5); }

    function initGame() {
      clearInterval(interval);
      flipped = []; matched = 0; moves = 0; timer = 0; lock = false; started = false;
      document.getElementById('moves').textContent = '0';
      document.getElementById('found').textContent = '0/8';
      document.getElementById('timer').textContent = '0s';
      document.getElementById('win-msg').textContent = '';
      const deck = shuffle(emojis);
      const board = document.getElementById('board');
      board.innerHTML = '';
      deck.forEach(emoji => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.emoji = emoji;
        card.innerHTML = `<span class="front">${emoji}</span><span class="back">?</span>`;
        card.addEventListener('click', () => flipCard(card));
        board.appendChild(card);
      });
    }

    function startTimer() {
      interval = setInterval(() => {
        timer++;
        document.getElementById('timer').textContent = timer + 's';
      }, 1000);
    }

    function flipCard(card) {
      if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
      if (!started) { started = true; startTimer(); }
      card.classList.add('flipped');
      flipped.push(card);
      if (flipped.length === 2) {
        lock = true;
        moves++;
        document.getElementById('moves').textContent = moves;
        if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
          flipped.forEach(c => c.classList.add('matched'));
          matched++;
          document.getElementById('found').textContent = matched + '/8';
          flipped = []; lock = false;
          if (matched === 8) {
            clearInterval(interval);
            document.getElementById('win-msg').textContent = `Gewonnen in ${moves} pogingen en ${timer}s!`;
          }
        } else {
          setTimeout(() => {
            flipped.forEach(c => c.classList.remove('flipped'));
            flipped = []; lock = false;
          }, 900);
        }
      }
    }

    initGame();
  </script>
</body>
</html>
