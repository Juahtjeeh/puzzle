<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f3; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem 1rem; color: #1a1a1a; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }

    .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 520px; }
    .screen.active { display: flex; }

    #nickname-screen { gap: 12px; }
    #nickname-screen p { font-size: 14px; color: #888; }
    #nickname-input { padding: 10px 14px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 15px; width: 280px; background: #fff; color: #1a1a1a; }
    #nickname-input:focus { outline: none; border-color: #888; }
    #nickname-input.error { border-color: #E24B4A; }
    .error-msg { font-size: 12px; color: #E24B4A; min-height: 16px; }

    #start-screen { gap: 12px; }
    #start-screen p { font-size: 14px; color: #888; }
    .level-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 280px; }
    .level-btn { padding: 16px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; font-size: 15px; font-weight: 500; text-align: center; transition: background 0.1s; }
    .level-btn:hover { background: #efefed; }
    .level-btn span { display: block; font-size: 12px; font-weight: 400; color: #888; margin-top: 2px; }

    .stats { display: flex; gap: 12px; margin-bottom: 1rem; width: 100%; }
    .stat { flex: 1; background: #fff; border-radius: 8px; border: 0.5px solid #ddd; padding: 10px; text-align: center; }
    .stat-label { font-size: 12px; color: #888; }
    .stat-value { font-size: 20px; font-weight: 500; }
    .board { display: grid; gap: 8px; width: 100%; }
    .card { aspect-ratio: 1; border-radius: 8px; border: 0.5px solid #ccc; background: #e8e8e5; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; user-select: none; }
    .card:hover { transform: scale(1.05); }
    .card.flipped, .card.matched { background: #fff; }
    .card.matched { border-color: #1D9E75; opacity: 0.6; cursor: default; }
    .card.matched:hover { transform: none; }
    .front { display: none; }
    .card.flipped .front, .card.matched .front { display: block; }
    .card.flipped .back, .card.matched .back { display: none; }
    .back { color: #aaa; }
    .win-msg { margin-top: 1rem; color: #1D9E75; font-weight: 500; font-size: 15px; min-height: 22px; text-align: center; }
    .btn-row { display: flex; gap: 10px; margin-top: 1rem; flex-wrap: wrap; justify-content: center; }

    #leaderboard-screen { gap: 16px; }
    .lb-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .lb-tab { padding: 6px 16px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; }
    .lb-tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .lb-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .lb-table th { text-align: left; padding: 8px 10px; color: #888; font-weight: 400; border-bottom: 0.5px solid #ddd; font-size: 12px; }
    .lb-table td { padding: 10px 10px; border-bottom: 0.5px solid #f0f0ee; }
    .lb-table tr:last-child td { border-bottom: none; }
    .rank { font-weight: 500; color: #888; }
    .rank.gold { color: #BA7517; }
    .rank.silver { color: #636363; }
    .rank.bronze { color: #854F0B; }
    .lb-empty { color: #aaa; font-size: 14px; text-align: center; padding: 2rem 0; }
    .lb-loading { color: #aaa; font-size: 14px; text-align: center; padding: 2rem 0; }

    button.small { padding: 8px 20px; border: 0.5px solid #ccc; border-radius: 8px; background: transparent; color: #1a1a1a; cursor: pointer; font-size: 14px; }
    button.small:hover { background: #efefed; }
    button.primary { padding: 10px 28px; border: 0.5px solid #1a1a1a; border-radius: 8px; background: #1a1a1a; color: #fff; cursor: pointer; font-size: 14px; }
    button.primary:hover { background: #333; }
    .nickname-tag { font-size: 13px; color: #888; margin-bottom: 0.5rem; }
    .nickname-tag strong { color: #1a1a1a; }
  </style>
</head>
<body>
  <h1>Memory</h1>

  <div id="nickname-screen" class="screen active">
    <p>Voer je nickname in om te beginnen</p>
    <input id="nickname-input" type="text" maxlength="20" placeholder="Alleen letters en cijfers" />
    <div class="error-msg" id="nickname-error"></div>
    <button class="primary" onclick="submitNickname()">Doorgaan</button>
  </div>

  <div id="start-screen" class="screen">
    <div class="nickname-tag">Speler: <strong id="display-name"></strong></div>
    <p>Kies een moeilijkheidsgraad</p>
    <div class="level-grid">
      <button class="level-btn" onclick="startGame(8)">8 kaarten<span>Makkelijk</span></button>
      <button class="level-btn" onclick="startGame(16)">16 kaarten<span>Normaal</span></button>
      <button class="level-btn" onclick="startGame(32)">32 kaarten<span>Moeilijk</span></button>
      <button class="level-btn" onclick="startGame(64)">64 kaarten<span>Extreem</span></button>
    </div>
    <button class="small" style="margin-top:8px;" onclick="showLeaderboard(8)">Leaderboard</button>
  </div>

  <div id="game-screen" class="screen">
    <div class="stats">
      <div class="stat"><div class="stat-label">Pogingen</div><div class="stat-value" id="moves">0</div></div>
      <div class="stat"><div class="stat-label">Gevonden</div><div class="stat-value" id="found">0</div></div>
      <div class="stat"><div class="stat-label">Tijd</div><div class="stat-value" id="timer">0s</div></div>
    </div>
    <div class="board" id="board"></div>
    <div class="win-msg" id="win-msg"></div>
    <div class="btn-row">
      <button class="small" onclick="restartLevel()">Opnieuw</button>
      <button class="small" onclick="showScreen('start-screen')">Menu</button>
      <button class="small" onclick="showLeaderboard(currentPairs * 2)">Leaderboard</button>
    </div>
  </div>

  <div id="leaderboard-screen" class="screen">
    <div class="lb-tabs">
      <button class="lb-tab" onclick="showLeaderboard(8)" id="tab-8">8 kaarten</button>
      <button class="lb-tab" onclick="showLeaderboard(16)" id="tab-16">16 kaarten</button>
      <button class="lb-tab" onclick="showLeaderboard(32)" id="tab-32">32 kaarten</button>
      <button class="lb-tab" onclick="showLeaderboard(64)" id="tab-64">64 kaarten</button>
    </div>
    <div id="lb-content" style="width:100%;"></div>
    <div class="btn-row">
      <button class="small" onclick="showScreen('start-screen')">Terug</button>
    </div>
  </div>

  <script>
    const API_BASE = 'https://puzzle-delta-three.vercel.app/api/scores';
    const NICKNAME_REGEX = /^[a-zA-Z0-9]+$/;

    const allEmojis = [
      '🍕','🎸','🌵','🐬','🦋','🎯','🍄','🚀',
      '🦊','🌈','🎃','🍦','🏔️','🎹','🦁','🐙',
      '🌸','🎲','🍉','🦄','🔥','🎨','🐘','🌙',
      '🍋','🎭','🦅','🐠','🌺','🎪','🍇','🏄',
      '🎡','🦩','🐳','🌴','🎠','🦚','🍓','🏕️',
      '🎢','🦜','🐋','🌻','🦝','🍑','🧩','🦒',
      '🐊','🌾','🎺','🦘','🍒','🧸','🎻','🦓',
      '🐆','🌿','🎷','🦙','🍈','🌊','🎬','🦔',
    ];

    let nickname = '';
    let currentPairs = 0;
    let flipped = [], matched = 0, moves = 0, lock = false, timer = 0, interval = null, started = false;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function submitNickname() {
      const input = document.getElementById('nickname-input');
      const errorEl = document.getElementById('nickname-error');
      const val = input.value.trim();

      input.classList.remove('error');
      errorEl.textContent = '';

      if (!val) {
        input.classList.add('error');
        errorEl.textContent = 'Voer een nickname in';
        input.focus();
        return;
      }

      if (!NICKNAME_REGEX.test(val)) {
        input.classList.add('error');
        errorEl.textContent = 'Alleen letters en cijfers toegestaan';
        input.focus();
        return;
      }

      nickname = val;
      document.getElementById('display-name').textContent = nickname;
      showScreen('start-screen');
    }

    document.getElementById('nickname-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitNickname();
    });

    document.getElementById('nickname-input').addEventListener('input', e => {
      const input = e.target;
      const errorEl = document.getElementById('nickname-error');
      if (NICKNAME_REGEX.test(input.value) || input.value === '') {
        input.classList.remove('error');
        errorEl.textContent = '';
      }
    });

    function startGame(cards) {
      currentPairs = cards / 2;
      showScreen('game-screen');
      initGame();
    }

    function initGame() {
      clearInterval(interval);
      flipped = []; matched = 0; moves = 0; timer = 0; lock = false; started = false;
      document.getElementById('moves').textContent = '0';
      document.getElementById('found').textContent = '0/' + currentPairs;
      document.getElementById('timer').textContent = '0s';
      document.getElementById('win-msg').textContent = '';

      const pairs = currentPairs;
      const cols = pairs <= 4 ? 4 : pairs <= 8 ? 4 : pairs <= 16 ? 8 : 8;
      const fontSize = pairs <= 4 ? '28px' : pairs <= 8 ? '24px' : pairs <= 16 ? '18px' : '13px';

      const board = document.getElementById('board');
      board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      board.innerHTML = '';

      const emojis = allEmojis.slice(0, pairs);
      const deck = [...emojis, ...emojis].sort(() => Math.random() - 0.5);

      deck.forEach(emoji => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.emoji = emoji;
        card.innerHTML = `<span class="front" style="font-size:${fontSize}">${emoji}</span><span class="back" style="font-size:${fontSize}">?</span>`;
        card.addEventListener('click', () => flipCard(card));
        board.appendChild(card);
      });
    }

    function restartLevel() { initGame(); }

    function startTimer() {
      interval = setInterval(() => {
        timer++;
        document.getElementById('timer').textContent = timer + 's';
      }, 1000);
    }

    function flipCard(card) {
      if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
      if (!started) { started = true; startTimer(); }
      card.classList.add('flipped');
      flipped.push(card);
      if (flipped.length === 2) {
        lock = true;
        moves++;
        document.getElementById('moves').textContent = moves;
        if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
          flipped.forEach(c => c.classList.add('matched'));
          matched++;
          document.getElementById('found').textContent = matched + '/' + currentPairs;
          flipped = []; lock = false;
          if (matched === currentPairs) {
            clearInterval(interval);
            document.getElementById('win-msg').textContent = `Gewonnen in ${moves} pogingen en ${timer}s!`;
            saveScore(currentPairs * 2, timer);
          }
        } else {
          setTimeout(() => {
            flipped.forEach(c => c.classList.remove('flipped'));
            flipped = []; lock = false;
          }, 900);
        }
      }
    }

    async function saveScore(level, time_seconds) {
      try {
        await fetch(`${API_BASE}/post`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname, level, time_seconds })
        });
      } catch(e) {
        console.error('Score opslaan mislukt:', e);
      }
    }

    async function showLeaderboard(level) {
      showScreen('leaderboard-screen');
      document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
      const tab = document.getElementById('tab-' + level);
      if (tab) tab.classList.add('active');

      const content = document.getElementById('lb-content');
      content.innerHTML = '<div class="lb-loading">Laden...</div>';

      try {
        const res = await fetch(`${API_BASE}/get?level=${level}`);
        const scores = await res.json();

        if (!scores.length) {
          content.innerHTML = '<div class="lb-empty">Nog geen scores voor dit niveau.</div>';
          return;
        }

        const rankLabel = (i) => {
          if (i === 0) return '<span class="rank gold">1</span>';
          if (i === 1) return '<span class="rank silver">2</span>';
          if (i === 2) return '<span class="rank bronze">3</span>';
          return `<span class="rank">${i + 1}</span>`;
        };

        const escapeHtml = (str) => str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');

        content.innerHTML = `
          <table class="lb-table">
            <thead><tr><th>#</th><th>Nickname</th><th>Tijd</th></tr></thead>
            <tbody>
              ${scores.map((s, i) => `
                <tr>
                  <td>${rankLabel(i)}</td>
                  <td>${escapeHtml(s.nickname)}</td>
                  <td>${s.time_seconds}s</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch(e) {
        content.innerHTML = '<div class="lb-empty">Leaderboard kon niet worden geladen.</div>';
      }
    }
  </script>
</body>
</html>
